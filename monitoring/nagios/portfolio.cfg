define command {
    command_name    check_portfolio_tcp
    command_line    $USER1$/check_tcp -H $HOSTADDRESS$ -p 80
}

define host {
    use                     linux-server
    host_name               portfolio-app
    alias                   Online Portfolio Website
    address                 app
    check_command           check_portfolio_tcp
    check_interval          1
    retry_interval          1
    max_check_attempts      3
}

define service {
    use                     generic-service
    host_name               portfolio-app
    service_description     HTTP Service
    check_command           check_http!-p 80 -u /health
    check_interval          1
    retry_interval          1
    max_check_attempts      3
}
